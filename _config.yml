theme: jekyll-theme-minimal
title: Dropshipment API
description: Dropshipment API Documentation
showMiniToc: true

# GitHub Pages settings
markdown: kramdown
kramdown:
  toc_levels: 1..3
  auto_ids: true

# Navigation and sidebar
nav_enabled: true
search_enabled: true

# Build settings
plugins:
  - jekyll-toc

# Table of Contents settings
toc:
  min_level: 1
  max_level: 3
  ordered: false
